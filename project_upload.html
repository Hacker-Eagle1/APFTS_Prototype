    <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>APFTS | Upload Project</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;} body{ background: linear-gradient(145deg,#d9f0fc,#b0e5f5); font-family: system-ui; }
        .navbar{ background: #0c4a6e; padding:1rem 2rem; display: flex; justify-content: space-between; color:white; }
        .main-grid{ display: grid; grid-template-columns: 1fr 340px; gap: 1.5rem; padding: 2rem; max-width: 1400px; margin:0 auto; }
        .form-card, .ai-preview{ background: rgba(255,255,255,0.9); backdrop-filter: blur(8px); border-radius: 32px; padding:1.5rem; border:1px solid white; }
        .form-row{ display:grid; grid-template-columns:1fr 1fr; gap:1rem; margin-bottom:1rem; }
        input, select, textarea{ width:100%; padding:0.7rem; border-radius: 28px; border:1px solid #bae6fd; }
        button{ background:#0284c7; color:white; border:none; padding:0.8rem 1.5rem; border-radius:40px; cursor:pointer; }
        .denied{ text-align:center; padding:3rem; background:white; border-radius:32px; margin:2rem; }
    </style>
</head>
<body><div class="navbar"><span>📤 Project Submission</span><a href="index.html" style="color:white;">Home</a></div><div id="content"></div>
<script>
    const role = sessionStorage.getItem('userRole');
    if(role !== 'Project Institution') document.getElementById('content').innerHTML = `<div class="denied"><h2>⛔ Access Denied</h2><p>Only Project Institutions can upload proposals.</p><a href="index.html">Return</a></div>`;
    else document.getElementById('content').innerHTML = `<div class="main-grid"><div class="form-card"><h2>📐 New Proposal</h2><form onsubmit="alert('Submitted for AI analysis');return false;"><div class="form-row"><div><label>Project name</label><input></div><div><label>Contractor</label><input></div></div><div class="form-row"><div><label>Budget (USD)</label><input></div><div><label>GPS</label><input></div></div><div class="form-row"><div><label>Timeline (months)</label><input></div><div><label>Reporting</label><select><option>Monthly</option></select></div></div><div><label>Milestones</label><textarea rows="2"></textarea></div><button>Submit to AI →</button></form></div><div class="ai-preview"><h3>🧠 AI Pre-analysis</h3><div>Risk: <span class="badge">Medium</span></div><div class="progress-bar" style="background:#cbd5e1; height:6px; border-radius:6px; margin:8px 0;"><div style="width:28%; background:#0284c7; height:6px;"></div></div><div>Satellite baseline pending</div></div></div>`;
</script>
</body>
</html>
