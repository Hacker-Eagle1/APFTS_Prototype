<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>AI Anomaly Dashboard</title><style>
*{margin:0;padding:0;box-sizing:border-box;} body{ background: radial-gradient(circle at 10% 30%, #ccf0ff, #9fd3f0); font-family: system-ui; }
.header{ background:#0c4a6e; padding:1rem 2rem; display: flex; justify-content: space-between; color:white; }
.grid-ai{ display:grid; grid-template-columns: repeat(3,1fr); gap:1.2rem; padding:2rem; }
.risk-card{ background:rgba(255,255,255,0.9); border-radius:28px; padding:1.2rem; border-left:6px solid; }
.high{ border-left-color:#c72a2a; } .med{ border-left-color:#e68a2e; } .low{ border-left-color:#2c7a4d; }
.anomaly-feed{ background:rgba(12,74,110,0.8); color:white; margin:0 2rem 2rem; border-radius:28px; padding:1rem; }
.denied{ text-align:center; padding:3rem; background:white; border-radius:32px; margin:2rem; }
</style></head>
<body><div class="header"><span>🤖 AI Core – Risk Intelligence</span><a href="index.html" style="color:white;">Home</a></div><div id="aiContent"></div>
<script>
    const role = sessionStorage.getItem('userRole');
    const allowed = ['Regulatory Authority','Financing Institution'];
    if(!role || !allowed.includes(role)) document.getElementById('aiContent').innerHTML = `<div class="denied"><h2>⛔ Classified</h2><p>AI dashboard restricted to regulators & financiers.</p><a href="index.html">Back</a></div>`;
    else document.getElementById('aiContent').innerHTML = `<div class="grid-ai"><div class="risk-card high"><h3>⚠️ High Risk</h3><div>Western Dam (92)</div><div>Coastal Hwy (88)</div><button style="background:#0284c7; border:none; padding:0.3rem 1rem; border-radius:20px;">Investigate</button></div><div class="risk-card med"><h3>⚠️ Medium</h3><div>Rail Extension (67)</div><div>Hospital (59)</div></div><div class="risk-card low"><h3>✅ Low Risk</h3><div>Solar Scheme (22)</div><div>Schools (18)</div></div></div><div class="anomaly-feed"><h4>🚨 Live Anomalies</h4><div>• Overrun +$4.2M unaccounted</div><div>• Satellite mismatch: 21% vs 58% reported</div><div><strong>AI Rec:</strong> Audit Eastern Province</div></div>`;
</script></body></html>
