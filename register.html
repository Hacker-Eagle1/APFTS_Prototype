<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>APFTS | Register</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;} body{ background: linear-gradient(120deg,#d4f1f9,#a5f0fc); font-family: system-ui; }
        .nav-bar{ background: rgba(2,84,99,0.8); backdrop-filter: blur(12px); padding:1rem 2rem; display: flex; justify-content: space-between; color:white; }
        .register-container{ max-width: 1200px; margin: 2rem auto; display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; padding:1rem; }
        .card{ background: rgba(255,255,255,0.9); backdrop-filter: blur(8px); border-radius: 32px; padding:1.8rem; border:1px solid white; }
        h2{ border-left: 4px solid #0284c7; padding-left: 12px; margin-bottom:1rem; }
        .form-grid{ display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
        input, select{ width:100%; padding:0.7rem; border-radius: 28px; border:1px solid #bae6fd; }
        .btn-reg{ background:#0284c7; color:white; border:none; padding:0.8rem; border-radius:40px; width:100%; margin-top:1rem; cursor:pointer; }
        footer{ background:#0c4a6e; color:#bae6fd; text-align:center; padding:1rem; margin-top:2rem; }
    </style>
</head>
<body>
<div class="nav-bar"><span>🛰️ APFTS Registration</span><a href="index.html" style="color:white;">Home</a></div>
<div class="register-container">
    <div class="card"><h2>🏛️ Institution Registration</h2>
        <form id="instForm"><div class="form-grid"><div><label>Entity type</label><select id="instRole"><option>Financing Institution</option><option>Project Institution</option><option>Regulatory Body</option></select></div><div><label>Region</label><input placeholder="Central"></div><div class="full-width" style="grid-column:span 2"><label>Legal name</label><input></div><div><label>Email</label><input type="email"></div><div><label>Password</label><input type="password" id="instPwd"></div></div><button type="button" class="btn-reg" onclick="registerInst()">Register →</button></form>
    </div>
    <div class="card"><h2>👥 Citizen / Media</h2><form id="citizenForm"><div><label>Full name</label><input></div><div class="form-grid"><div><label>Role</label><select id="citizenRole"><option>Citizen</option><option>Journalist</option><option>NGO</option></select></div><div><label>Region</label><input></div></div><div><label>Email</label><input type="email"></div><div><label>Password</label><input type="password" id="citizenPwd"></div><button type="button" class="btn-reg" onclick="registerCitizen()">Create Account</button></form></div>
</div>
<footer>All data protected · Whistleblower rights</footer>
<script>
    function registerInst(){ const map={'Financing Institution':'Financing Institution','Project Institution':'Project Institution','Regulatory Body':'Regulatory Authority'}; sessionStorage.setItem('userRole',map[document.getElementById('instRole').value]); alert('Registered! You may login.'); location.href='login.html'; }
    function registerCitizen(){ sessionStorage.setItem('userRole','Public/Citizen'); alert('Citizen account created'); location.href='login.html'; }
</script>
</body>
</html>
